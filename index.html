<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Mood Gardener 🌱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- face-api -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
      background: #f0f8f5;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
    }

    h2 {
      margin: 5px 0;
      text-align: center;
    }

    .camera-section {
      flex: 3;
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      background: black;
    }

    #emoji-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .emoji {
      position: absolute;
      font-size: 28px;
      animation: floatUp 2s ease-out forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-120px); opacity: 0; }
    }

    .info-section {
      flex: 1;
      text-align: center;
      padding: 5px;
    }

    #result {
      font-size: 22px;
      font-weight: bold;
    }

    #tips {
      font-size: 16px;
      margin-top: 5px;
    }

    .chart-section {
      flex: 2;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>

<div class="app">

  <h2>🌱 AI Mood Gardener</h2>

  <div class="camera-section">
    <video id="video" autoplay muted playsinline></video>
    <div id="emoji-container"></div>
  </div>

  <div class="info-section">
    <div id="result">Loading AI...</div>
    <div id="tips"></div>
  </div>

  <div class="chart-section">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
const video = document.getElementById('video');
const resultText = document.getElementById('result');
const tipsText = document.getElementById('tips');

// ===== CONFIG =====
let lastEmotion = null;
let lastUpdateTime = 0;
const UPDATE_INTERVAL = 3000;
const CONFIDENCE_THRESHOLD = 0.6;

// ===== DATA =====
const moodData = {
  happy: {
    label: "Happy 😊",
    activities: ["Tell a joke 😄","Dance 💃","Clap game 👏","Say something nice 🤝"],
    tips: ["Water plant 💧","Give sunlight ☀️","Talk to plant 🌿"]
  },
  neutral: {
    label: "Normal 😐",
    activities: ["Clap game 👏","Deep breathing 🌬️","Stretch 🧘"],
    tips: ["Keep near window 🪟","Rotate plant 🔄","Clean leaves 🍃"]
  },
  sad: {
    label: "Tired 😴",
    activities: ["Stretch 🧘","Drink water 💧","Jump 🏃"],
    tips: ["Fresh air 🌿","Morning sunlight ☀️"]
  },
  angry: {
    label: "Low Mood 😕",
    activities: ["Deep breath 😤","Count to 10 🔢"],
    tips: ["Keep calm place 🌱","Water gently 💧"]
  },
  surprised: {
    label: "Excited 😲",
    activities: ["Say WOW 😲","Clap fast 👏"],
    tips: ["Bright light ☀️","Observe leaves 👀"]
  }
};

// ===== UTIL =====
function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ===== EMOJIS =====
function showEmojis(mood) {
  const container = document.getElementById("emoji-container");

  const emojiMap = {
    "Happy 😊": ["😄","🎉","✨"],
    "Normal 😐": ["🙂","🌿"],
    "Tired 😴": ["😴","💤"],
    "Low Mood 😕": ["😕","😞"],
    "Excited 😲": ["😲","🔥"]
  };

  const emojis = emojiMap[mood] || ["🙂"];

  for (let i = 0; i < 5; i++) {
    const el = document.createElement("div");
    el.className = "emoji";
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 90 + "%";
    el.style.top = Math.random() * 70 + "%";
    container.appendChild(el);

    setTimeout(() => el.remove(), 2000);
  }
}

// ===== CHART =====
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Mood',
      data: [],
      fill: false
    }]
  }
});

function moodToValue(mood) {
  if (mood.includes("Happy")) return 3;
  if (mood.includes("Normal")) return 2;
  return 1;
}

// ===== MAIN =====
async function start() {

  await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
  await faceapi.nets.faceExpressionNet.loadFromUri('./models');

  resultText.innerText = "Ready! Show your face 👇";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  }).then(stream => video.srcObject = stream);

  video.addEventListener('play', () => {

    setInterval(async () => {

      const detection = await faceapi
        .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceExpressions();

      if (!detection) return;

      const exp = detection.expressions;

      const sorted = Object.entries(exp)
        .sort((a, b) => b[1] - a[1]);

      const topEmotion = sorted[0][0];
      const confidence = sorted[0][1];
      const now = Date.now();

      if (
        confidence > CONFIDENCE_THRESHOLD &&
        topEmotion !== lastEmotion &&
        (now - lastUpdateTime > UPDATE_INTERVAL)
      ) {
        lastEmotion = topEmotion;
        lastUpdateTime = now;

        const data = moodData[topEmotion] || moodData["neutral"];
        const mood = data.label;
        const activity = getRandom(data.activities);
        const tip = getRandom(data.tips);

        resultText.innerText = `Mood: ${mood}`;
        tipsText.innerText = `${activity} | ${tip}`;

        showEmojis(mood);

        const time = new Date().toLocaleTimeString();
        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(moodToValue(mood));

        if (chart.data.labels.length > 10) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }

        chart.update();
      }

    }, 1000);

  });
}

window.addEventListener('load', start);
</script>

</body>
</html>
