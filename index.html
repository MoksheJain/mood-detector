<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8">
  <title>AI Mood Gardener 🌱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- face-api -->

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial;
      background: #f0f8f5;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin: 5px;
    }

    .camera-section {
      flex: 3;
      position: relative;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      background: black;
    }

    #emoji-container {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .emoji {
      position: absolute;
      font-size: 28px;
      animation: floatUp 2s ease-out forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-120px); opacity: 0; }
    }

    .info {
      text-align: center;
      padding: 10px;
    }

    #result {
      font-size: 22px;
      font-weight: bold;
    }

    #count {
      font-size: 18px;
      margin-top: 5px;
    }

    #classMood {
      font-size: 20px;
      margin-top: 5px;
    }

    #activity {
      font-size: 18px;
      margin-top: 5px;
    }

    .chart-section {
      flex: 2;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>

</head>

<body>

<div class="app">

  <h2>🌱 AI Mood Gardener (Live Class)</h2>

  <div class="camera-section">
    <video id="video" autoplay muted playsinline></video>
    <div id="emoji-container"></div>
  </div>

  <div class="info">
    <div id="result">Loading AI...</div>
    <div id="count">Students detected: 0</div>
    <div id="classMood"></div>
    <div id="activity"></div>
  </div>

  <div class="chart-section">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
const video = document.getElementById('video');
const resultText = document.getElementById('result');
const classMoodDiv = document.getElementById('classMood');
const activityText = document.getElementById('activity');
const countText = document.getElementById('count');

let moodHistory = [];
const MAX_HISTORY = 30;

// ===== ACTIVITIES =====
const activities = [
  "🎵 Dance break!",
  "👏 Clap game!",
  "🧘 Deep breathing",
  "😂 Tell a joke",
  "⚡ Jumping jacks"
];

// ===== CHART =====
const chart = new Chart(document.getElementById('chart'), {
  type: 'pie',
  data: {
    labels: ["Happy 😊","Neutral 😐","Sad 😴","Angry 😕","Excited 😲"],
    datasets: [{
      data: [0,0,0,0,0]
    }]
  }
});

// ===== UTILS =====
function showEmojis() {
  const container = document.getElementById("emoji-container");
  const emojis = ["😄","🎉","✨"];

  for (let i = 0; i < 5; i++) {
    const el = document.createElement("div");
    el.className = "emoji";
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 90 + "%";
    el.style.top = Math.random() * 70 + "%";
    container.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

function getPercentages() {
  let counts = { happy:0, neutral:0, sad:0, angry:0, surprised:0 };

  moodHistory.forEach(m => {
    if (counts[m] !== undefined) counts[m]++;
  });

  let p = {};
  for (let m in counts) {
    p[m] = moodHistory.length
      ? Math.round((counts[m] / moodHistory.length) * 100)
      : 0;
  }
  return p;
}

function updateChart(p) {
  chart.data.datasets[0].data = [
    p.happy,
    p.neutral,
    p.sad,
    p.angry,
    p.surprised
  ];
  chart.update();
}

function getOverallMood(p) {
  const score = p.happy;
  if (score >= 60) return `😊 Happy Class (${score}%)`;
  if (score >= 40) return `😐 Neutral Class (${score}%)`;
  return `😕 Not Happy Class (${score}%)`;
}

function getActivity(p) {
  if (p.sad > 40) return "⚡ Energy boost!";
  if (p.angry > 30) return "🧘 Calm down";
  if (p.happy > 60) return "🎉 Celebrate!";
  return activities[Math.floor(Math.random() * activities.length)];
}

// ===== MAIN =====
async function start() {

  await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
  await faceapi.nets.faceExpressionNet.loadFromUri('./models');

  resultText.innerText = "Ready! Show faces 👇";

  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream);

  video.addEventListener('play', () => {

    setInterval(async () => {

      const detections = await faceapi
        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
        .withFaceExpressions();

      if (!detections.length) return;

      // ===== LIVE STUDENT COUNT =====
      countText.innerText = `Students detected: ${detections.length}`;

      detections.forEach(det => {
        const exp = det.expressions;
        const sorted = Object.entries(exp).sort((a,b)=>b[1]-a[1]);
        const emotion = sorted[0][0];

        moodHistory.push(emotion);
      });

      if (moodHistory.length > MAX_HISTORY) {
        moodHistory.splice(0, moodHistory.length - MAX_HISTORY);
      }

      const p = getPercentages();

      resultText.innerText = "Analyzing class...";
      classMoodDiv.innerText = "Class Mood: " + getOverallMood(p);
      activityText.innerText = getActivity(p);

      updateChart(p);
      showEmojis();

    }, 1500);

  });
}

window.addEventListener('load', start);
</script>

</body>
</html>
