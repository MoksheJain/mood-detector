<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Mood Gardener 🌱</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial;
  background: #f0f8f5;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* TABS */
.tabs {
  display: flex;
  background: #dff5ea;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: #b2f2d7;
}

/* SECTIONS */
.section {
  display: none;
  flex: 1;
  flex-direction: column;
}

.section.active {
  display: flex;
}

/* CAMERA */
.camera-section {
  flex: 3;
  position: relative;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
  background: black;
}

/* INFO */
.info {
  text-align: center;
  padding: 10px;
}

.chart-section {
  flex: 2;
}

/* GAME */
#gameArea {
  position: relative;
  flex: 1;
  background: white;
  overflow: hidden;
}

.star {
  position: absolute;
  font-size: 30px;
  cursor: pointer;
}

#gameInfo {
  text-align: center;
  padding: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="app">

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'mood')">🌱 Mood</div>
    <div class="tab" onclick="switchTab(event, 'game')">🎮 Game</div>
  </div>

  <!-- MOOD -->
  <div id="mood" class="section active">

    <h2 style="text-align:center;">AI Mood Gardener 🌱</h2>

    <div class="camera-section">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="info">
      <div id="result">Loading AI...</div>
      <div id="count">Students detected: 0</div>
      <div id="classMood"></div>
      <div id="activity"></div>
    </div>

    <div class="chart-section">
      <canvas id="chart"></canvas>
    </div>

  </div>

  <!-- GAME -->
  <div id="game" class="section">

    <h2 style="text-align:center;">🎮 Catch the Star</h2>

    <div id="gameInfo">
      Score: <span id="score">0</span> |
      Time: <span id="time">30</span>s
    </div>

    <div id="gameArea"></div>

  </div>

</div>

<script>

/* TAB SWITCH */
function switchTab(e, id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  e.target.classList.add('active');
  document.getElementById(id).classList.add('active');

  if (id === 'game') startGame();
}

/* ================= GAME ================= */
let score = 0;
let timeLeft = 30;
let gameInterval;

function startGame() {
  clearInterval(gameInterval);

  score = 0;
  timeLeft = 30;

  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = timeLeft;

  gameInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    spawnStar();

    if (timeLeft <= 0) {
      clearInterval(gameInterval);
      alert("Game Over! Score: " + score);
    }
  }, 1000);
}

function spawnStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.innerText = "⭐";

  const area = document.getElementById("gameArea");

  star.style.left = Math.random() * 90 + "%";
  star.style.top = Math.random() * 80 + "%";

  star.onclick = () => {
    score++;
    document.getElementById("score").innerText = score;
    star.remove();
  };

  area.appendChild(star);
  setTimeout(() => star.remove(), 1500);
}

/* ================= MOOD AI ================= */

const video = document.getElementById('video');
const resultText = document.getElementById('result');
const classMoodDiv = document.getElementById('classMood');
const activityText = document.getElementById('activity');
const countText = document.getElementById('count');

let moodHistory = [];
const MAX_HISTORY = 30;

const activities = [
  "🎵 Dance break!",
  "👏 Clap game!",
  "🧘 Deep breathing",
  "😂 Tell a joke",
  "⚡ Jumping jacks"
];

const chart = new Chart(document.getElementById('chart'), {
  type: 'pie',
  data: {
    labels: ["Happy 😊","Neutral 😐","Sad 😴","Angry 😕","Surprised 😲"],
    datasets: [{ data: [0,0,0,0,0] }]
  }
});

function getPercentages() {
  let counts = { happy:0, neutral:0, sad:0, angry:0, surprised:0 };

  moodHistory.forEach(m => {
    if (counts[m] !== undefined) counts[m]++;
  });

  let p = {};
  for (let m in counts) {
    p[m] = moodHistory.length
      ? Math.round((counts[m] / moodHistory.length) * 100)
      : 0;
  }
  return p;
}

function updateChart(p) {
  chart.data.datasets[0].data = [
    p.happy, p.neutral, p.sad, p.angry, p.surprised
  ];
  chart.update();
}

function getOverallMood(p) {
  if (p.happy >= 60) return "😊 Happy Class";
  if (p.happy >= 40) return "😐 Neutral Class";
  return "😕 Not Happy Class";
}

function getActivity(p) {
  if (p.sad > 40) return "⚡ Energy boost!";
  if (p.angry > 30) return "🧘 Calm down";
  if (p.happy > 60) return "🎉 Celebrate!";
  return activities[Math.floor(Math.random() * activities.length)];
}

async function startAI() {

  try {
    resultText.innerText = "Loading AI models...";

    await faceapi.nets.tinyFaceDetector.loadFromUri(
      'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'
    );
    await faceapi.nets.faceExpressionNet.loadFromUri(
      'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'
    );

    resultText.innerText = "Starting camera...";

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    video.addEventListener('play', () => {

      resultText.innerText = "AI Ready! 😊";

      setInterval(async () => {

        const detections = await faceapi
          .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceExpressions();

        if (!detections.length) return;

        countText.innerText = "Students detected: " + detections.length;

        detections.forEach(det => {
          const emotion = Object.entries(det.expressions)
            .sort((a,b)=>b[1]-a[1])[0][0];

          moodHistory.push(emotion);
        });

        if (moodHistory.length > MAX_HISTORY) {
          moodHistory.splice(0, moodHistory.length - MAX_HISTORY);
        }

        const p = getPercentages();

        classMoodDiv.innerText = "Class Mood: " + getOverallMood(p);
        activityText.innerText = getActivity(p);

        updateChart(p);

      }, 1500);

    });

  } catch (err) {
    resultText.innerText = "❌ Error loading AI";
    console.error(err);
    alert("Make sure you're using Live Server or HTTPS!");
  }
}

window.onload = startAI;

</script>

</body>
</html>
